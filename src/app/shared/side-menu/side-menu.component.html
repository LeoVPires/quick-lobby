<ion-menu contentId="main-content" type="overlay" side="end">
  <ion-header>
    <ion-toolbar>
      <ion-title>Menu</ion-title>
      <ion-buttons slot="end">
        <ion-menu-toggle>
          <ion-button>
            <ion-icon name="close"></ion-icon>
          </ion-button>
        </ion-menu-toggle>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-footer>
    <ion-list lines="none">
      <ion-item>
        <ion-toggle
          [(ngModel)]="paletteToggle"
          (ionChange)="toggleChange($event)"
          justify="space-between"
          >Dark Mode</ion-toggle
        >
      </ion-item>
    </ion-list>
  </ion-footer>
</ion-menu>
